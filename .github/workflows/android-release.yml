name: Android Closed Testing Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      versionCode:
        description: Play Store versionCode. Must be higher than every previous upload.
        required: true
        type: string
      versionName:
        description: User-visible version name.
        required: true
        default: "1.0.0"
        type: string

permissions:
  contents: read

concurrency:
  group: android-closed-testing-release
  cancel-in-progress: false

jobs:
  bundle:
    name: Build and upload to closed testing
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Check Play service account secret
        run: test -n "$PLAY_SERVICE_ACCOUNT_JSON"
        env:
          PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}

      - name: Decode upload keystore
        run: |
          test -n "$RELEASE_KEYSTORE_BASE64"
          printf '%s' "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/release.keystore"
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}

      - name: Resolve release version
        id: release_version
        run: |
          if [ "$GITHUB_EVENT_NAME" = "workflow_dispatch" ]; then
            echo "version_code=$INPUT_VERSION_CODE" >> "$GITHUB_OUTPUT"
            echo "version_name=$INPUT_VERSION_NAME" >> "$GITHUB_OUTPUT"
          else
            echo "version_code=$GITHUB_RUN_NUMBER" >> "$GITHUB_OUTPUT"
            echo "version_name=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          fi
        env:
          INPUT_VERSION_CODE: ${{ inputs.versionCode }}
          INPUT_VERSION_NAME: ${{ inputs.versionName }}

      - name: Test and build signed bundle
        run: ./gradlew test bundleRelease --no-daemon
        env:
          VERSION_CODE: ${{ steps.release_version.outputs.version_code }}
          VERSION_NAME: ${{ steps.release_version.outputs.version_name }}
          RELEASE_STORE_FILE: ${{ runner.temp }}/release.keystore
          RELEASE_STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: tabuada-release-aab
          path: app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
          retention-days: 14

      - name: Upload to Play closed testing
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.geison.tabuada
          releaseFiles: app/build/outputs/bundle/release/app-release.aab
          track: alpha
          status: completed
          releaseName: ${{ steps.release_version.outputs.version_name }} (${{ steps.release_version.outputs.version_code }})
          whatsNewDirectory: play-store/whatsnew
